name: Deploy to GitHub Pages

# Branch-based delivery: build on push, publish the compiled site to the
# `gh-pages` branch, and let Pages serve that branch. This avoids the
# actions/deploy-pages deployment API, which has been failing intermittently
# for this repository ("Deployment failed, try again later").
#
# One-time setup: Settings → Pages → Source: "Deploy from a branch"
#                 → Branch: gh-pages, folder: / (root)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # .nojekyll stops the branch-based Pages pipeline from running the
      # built site through Jekyll (which would drop files and slow deploys).
      - run: touch dist/.nojekyll
      - name: Publish dist/ to gh-pages branch
        run: |
          cd dist
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ${GITHUB_SHA::9}"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
